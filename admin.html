<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Wheat Community · Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;padding:32px;}
    h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;}
    .sub{font-size:13px;color:#6b7280;margin-bottom:28px;}
    .tabs{display:flex;gap:8px;margin-bottom:24px;}
    .tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #2a2a3a;background:#1e1e2e;color:#6b7280;transition:all .2s;}
    .tab.active{background:#6366f1;border-color:#6366f1;color:#fff;}
    .count-badge{display:inline-block;background:#ef4444;color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #2a2a3a;}
    td{padding:14px;border-bottom:1px solid #1e1e2e;vertical-align:top;}
    tr:hover td{background:#13131a;}
    .name{font-weight:700;color:#fff;margin-bottom:3px;}
    .tagline{font-size:12px;color:#9ca3af;}
    .tag{display:inline-block;padding:2px 8px;background:#1e1e2e;border:1px solid #2a2a3a;border-radius:10px;font-size:11px;color:#9ca3af;margin-right:4px;}
    .source-badge{display:inline-block;padding:2px 8px;background:#1a1a35;border:1px solid #6366f1;border-radius:10px;font-size:10px;color:#a5b4fc;margin-left:4px;}
    .status-pending{color:#f59e0b;font-weight:700;}
    .status-approved{color:#10b981;font-weight:700;}
    .status-rejected{color:#ef4444;font-weight:700;}
    .action-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;margin-right:4px;transition:all .2s;}
    .approve-btn{background:#10b981;color:#fff;}
    .reject-btn{background:#1e1e2e;color:#ef4444;border:1px solid #ef4444;}
    .approve-btn:hover{opacity:.85;}
    .reject-btn:hover{background:#ef4444;color:#fff;}
    .empty{text-align:center;padding:60px;color:#6b7280;}
    .back-link{display:inline-block;margin-bottom:20px;font-size:13px;color:#6366f1;cursor:pointer;text-decoration:none;}
    .refresh-note{font-size:11px;color:#4b5563;margin-left:12px;}
  </style>
</head>
<body>
  <a class="back-link" href="/">← Back to Community</a>
  <h1>🌾 Wheat Community · Admin Panel</h1>
  <p class="sub">Review submitted products and publish them to the community. <span class="refresh-note">Auto-refreshes every 15s</span></p>

  <div class="tabs">
    <div class="tab active" onclick="loadTab('pending',this)">Pending <span class="count-badge" id="pendingCount" style="display:none">0</span></div>
    <div class="tab" onclick="loadTab('approved',this)">Published <span id="approvedCount" style="font-size:11px;color:#6b7280;margin-left:4px;"></span></div>
    <div class="tab" onclick="loadTab('rejected',this)">Rejected</div>
    <div class="tab" style="margin-left:auto; background:linear-gradient(135deg,#f4c430,#f59e0b); color:#000; border:none;" onclick="loadOrders(this)">💰 Launchpad Orders</div>
    <div class="tab" style="background:#1e1e2e; color:#a5b4fc; border:1px solid #6366f1;" onclick="loadLeads(this)">📧 Leads</div>
  </div>

  <div id="tableWrap"></div>

<script>
let adminToken = localStorage.getItem('wheat_admin_token') || '';
let currentTab='pending';
let allProducts=[];

async function loadAll(){
  if (!adminToken) {
    adminToken = prompt("Enter Admin Password:");
    if (!adminToken) return;
    localStorage.setItem('wheat_admin_token', adminToken);
  }
  try{
    const res=await fetch('/api/products/all', {
      headers: { 'Authorization': 'Bearer ' + adminToken }
    });
    if (res.status === 401) {
      alert("Unauthorized! Incorrect password.");
      localStorage.removeItem('wheat_admin_token');
      adminToken = '';
      return;
    }
    allProducts=await res.json();
  }catch(e){allProducts=[];}
  updateCounts();renderTable(currentTab);
}

function updateCounts(){
  const pending=allProducts.filter(p=>p.status==='pending').length;
  const el=document.getElementById('pendingCount');
  el.textContent=pending;el.style.display=pending?'inline-block':'none';
  const approved=allProducts.filter(p=>p.status==='approved').length;
  document.getElementById('approvedCount').textContent=approved?`(${approved})`:'';
}

function loadTab(status,el){
  currentTab=status;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderTable(status);
}

function renderTable(status){
  const list=allProducts.filter(p=>p.status===status);
  const wrap=document.getElementById('tableWrap');
  if(!list.length){wrap.innerHTML=`<div class="empty">No ${status} submissions.</div>`;return;}
  wrap.innerHTML=`<table>
    <thead><tr>
      <th>Product</th><th>Category</th><th>Website</th><th>Contact</th><th>Submitted</th><th>Action</th>
    </tr></thead>
    <tbody>
      ${list.map(p=>`
        <tr>
          <td>
            <div class="name">${p.icon||'🤖'} ${p.name}
              ${p.source==='genius_plan'?'<span class="source-badge">⚡ Genius Plan</span>':''}
            </div>
            <div class="tagline">${p.tagline||''}</div>
          </td>
          <td><span class="tag">${p.tag||'—'}</span></td>
          <td style="font-size:12px;max-width:140px;word-break:break-all;">
            ${p.url?`<a href="${p.url}" target="_blank" style="color:#6366f1;">${p.url.substring(0,40)}…</a>`:'—'}
          </td>
          <td style="font-size:12px;color:#9ca3af;">${p.contact||'—'}</td>
          <td style="font-size:12px;color:#6b7280;white-space:nowrap;">${(p.receivedAt||'').substring(0,10)||'—'}</td>
          <td>
            ${status==='pending'?`
              <button class="action-btn approve-btn" onclick="review(${p.id},'approved')">✅ Approve</button>
              <button class="action-btn reject-btn" onclick="review(${p.id},'rejected')">✗ Reject</button>
            `:`<span class="status-${status}">${status==='approved'?'✅ Published':'✗ Rejected'}</span>`}
          </td>
        </tr>
      `).join('')}
    </tbody>
  </table>`;
}


async function loadOrders(el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="empty">Loading orders...</div>';
  try {
    const res = await fetch('/api/orders', { headers: { 'Authorization': 'Bearer ' + adminToken } });
    if(res.status === 401) { alert("Unauthorized"); return; }
    const orders = await res.json();
    if(!orders.length) { wrap.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
    wrap.innerHTML = '<table><thead><tr><th>Order ID</th><th>Product</th><th>Plan & Price</th><th>Contact</th><th>Status</th><th>Action</th></tr></thead><tbody>' + 
      orders.map(o => `
        <tr>
          <td style="font-family:monospace; font-size:11px; color:#a5b4fc;">${o.id}</td>
          <td><div class="name">${o.product}</div><div class="tagline">${o.audience}</div></td>
          <td><strong style="color:#f4c430">${o.plan.toUpperCase()}</strong><br><span style="font-size:11px;color:#9ca3af">${o.price} (${o.paymentMethod})</span></td>
          <td style="font-size:12px;">${o.contact}</td>
          <td><span style="font-weight:bold; color:${o.status==='delivered'?'#10b981':(o.status==='paid'?'#3b82f6':'#f59e0b')}">${(o.status||'pending').toUpperCase()}</span></td>
          <td>
            ${o.status !== 'delivered' ? `<button class="action-btn approve-btn" onclick="updateOrder('${o.id}', 'delivered')">Mark Delivered</button>` : '✅ Done'}
          </td>
        </tr>
      `).join('') + '</tbody></table>';
  } catch(e) { wrap.innerHTML = '<div class="empty">Error loading orders.</div>'; }
}

async function updateOrder(id, status) {
  await fetch('/api/orders/update', {
    method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer '+adminToken },
    body: JSON.stringify({id, status})
  });
  loadOrders();
}

async function loadLeads(el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  const wrap = document.getElementById('tableWrap');
  try {
    const res = await fetch('/api/leads', { headers: { 'Authorization': 'Bearer ' + adminToken } });
    if(res.status === 401) { alert("Unauthorized"); return; }
    const leads = await res.json();
    if(!leads.length) { wrap.innerHTML = '<div class="empty">No leads yet.</div>'; return; }
    wrap.innerHTML = '<table><thead><tr><th>Email</th><th>Source</th><th>Date</th></tr></thead><tbody>' + 
      leads.map(l => `<tr><td style="font-weight:bold;color:#fff;">${l.email}</td><td><span class="source-badge">${l.source}</span></td><td style="font-size:12px;color:#9ca3af;">${l.receivedAt.substring(0,10)}</td></tr>`).join('') + 
      '</tbody></table>';
  } catch(e) {}
}

async function review(id,status){
  try{
    const res = await fetch('/api/products/review',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': 'Bearer ' + adminToken
      },
      body:JSON.stringify({id,status})
    });
    if (res.status === 401) {
      alert("Unauthorized! Incorrect password.");
      return;
    }
    const idx=allProducts.findIndex(p=>p.id==id);
    if(idx>=0)allProducts[idx].status=status;
    updateCounts();renderTable(currentTab);
  }catch(e){alert('Action failed. Please check server.');}
}

loadAll();
setInterval(loadAll,15000);
</script>
</body>
</html>
